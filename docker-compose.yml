version: "3.9"

networks:
  tarea1_net:
    driver: bridge

volumes:
  metrics_data:

services:

  
  # Redis — Motor de cache
  
  redis:
    image: redis:7.2-alpine
    container_name: redis
    platform: linux/arm64        
    ports:
      - "6379:6379"
    networks:
      - tarea1_net
    command: >
      redis-server
      --maxmemory 1mb
      --maxmemory-policy allkeys-lfu 
      --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  
  # generador de Respuestas (Q1-Q5)
  
  responder:
    build:
      context: ./services/responder
      dockerfile: Dockerfile
    container_name: responder
    platform: linux/arm64
    volumes:
      - ./data/processed:/app/data
    environment:
      - PORT=8001
    ports:
      - "8001:8001"
    networks:
      - tarea1_net
    depends_on:
      redis:
        condition: service_healthy


  # sistema Cache

  cache:
    build:
      context: ./services/cache
      dockerfile: Dockerfile
    container_name: cache
    platform: linux/arm64
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RESPONDER_URL=http://responder:8001
      - CACHE_TTL=3600
      - PORT=8002
    ports:
      - "8002:8002"
    networks:
      - tarea1_net
    depends_on:
      redis:
        condition: service_healthy

  
  # almacenamiento de metricas
  
  metrics:
    build:
      context: ./services/metrics
      dockerfile: Dockerfile
    container_name: metrics
    platform: linux/arm64
    environment:
      - PORT=8003
    ports:
      - "8003:8003"
    volumes:
      - metrics_data:/app/metrics_store
    networks:
      - tarea1_net

  
  # generador de trafico
  
  traffic:
    build:
      context: ./services/traffic
      dockerfile: Dockerfile
    container_name: traffic
    platform: linux/arm64
    environment:
      - CACHE_URL=http://cache:8002
      - METRICS_URL=http://metrics:8003
      - DISTRIBUTION=zipf     # opciones: zipf | uniform
      - TOTAL_REQUESTS=10000
      - REQUEST_RATE=100       # requests por segundo
    networks:
      - tarea1_net
    depends_on:
      - cache
      - metrics