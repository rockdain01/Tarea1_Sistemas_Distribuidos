version: "3.9"

networks:
  tarea1_net:
    driver: bridge

volumes:
  metrics_data:

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - tarea1_net
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Retener mensajes 2h (útil para reintentos y análisis)
      KAFKA_LOG_RETENTION_MS: 7200000
    ports:
      - "9092:9092"
    networks:
      - tarea1_net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Crea los topics con las particiones correctas al iniciar
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - tarea1_net
    entrypoint: >
      bash -c "
        echo 'Creando topics...' &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic queries --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic retry --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic dlq --partitions 1 --replication-factor 1 &&
        echo 'Topics creados OK'
      "
    restart: "no"

  
  # Redis — Motor de cache
  
  redis:
    image: redis:7.2-alpine
    container_name: redis
    platform: linux/arm64        
    ports:
      - "6379:6379"
    networks:
      - tarea1_net
    command: >
      redis-server
      --maxmemory 50mb
      --maxmemory-policy allkeys-lfu 
      --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  
  # generador de Respuestas (Q1-Q5)
  
  responder:
    build:
      context: ./services/responder
      dockerfile: Dockerfile
    container_name: responder
    platform: linux/arm64
    volumes:
      - ./data/processed:/app/data
    environment:
      - PORT=8001
    ports:
      - "8001:8001"
    networks:
      - tarea1_net
    depends_on:
      redis:
        condition: service_healthy


  # sistema Cache

  cache:
    build:
      context: ./services/cache
      dockerfile: Dockerfile
    container_name: cache
    platform: linux/arm64
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RESPONDER_URL=http://responder:8001
      - CACHE_TTL=3600
      - PORT=8002
    ports:
      - "8002:8002"
    networks:
      - tarea1_net
    depends_on:
      redis:
        condition: service_healthy

  
  # almacenamiento de metricas
  
  metrics:
    build:
      context: ./services/metrics
      dockerfile: Dockerfile
    container_name: metrics
    platform: linux/arm64
    environment:
      - PORT=8003
    ports:
      - "8003:8003"
    volumes:
      - metrics_data:/app/metrics_store
    networks:
      - tarea1_net

  consumer:
    build:
      context: ./services/consumer
      dockerfile: Dockerfile
    platform: linux/arm64
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - CACHE_URL=http://cache:8002
      - METRICS_URL=http://metrics:8003
      - MAX_RETRIES=3
      - CONSUMER_GROUP=consumer-group
    networks:
      - tarea1_net
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      cache:
        condition: service_started
      metrics:
        condition: service_started
  # generador de trafico
  
  traffic:
    build:
      context: ./services/traffic
      dockerfile: Dockerfile
    container_name: traffic
    platform: linux/arm64
    environment:
      - CACHE_URL=http://cache:8002
      - METRICS_URL=http://metrics:8003
      - DISTRIBUTION=uniform     # opciones: zipf | uniform
      - TOTAL_REQUESTS=1000
      - REQUEST_RATE=10       # requests por segundo
      - KAFKA_BOOTSTRAP=kafka:9092
    networks:
      - tarea1_net
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      cache:
        condition: service_started
      metrics:
        condition: service_started